<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập & Đăng ký - SmartHome</title>
    <!-- CSS & Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 900px;
            display: flex;
        }
        .auth-image {
            flex: 1;
            background: linear-gradient(135deg, rgba(26,26,46,0.8), rgba(233,69,96,0.8)), url('https://img.freepik.com/free-photo/smart-home-device-control-phone-app_53876-133519.jpg?w=800') center/cover;
            display: none;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            color: #fff;
        }
        @media (min-width: 768px) {
            .auth-image { display: flex; }
        }
        .auth-form-container {
            flex: 1;
            padding: 40px;
            position: relative;
        }
        .form-control {
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .form-control:focus {
            background-color: var(--bg-main);
            color: var(--text-primary);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.25rem rgba(233, 69, 96, 0.25);
        }
        /* Toggle Forms */
        #register-form { display: none; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fa-solid fa-house-signal"></i> Smart<span>Home</span></a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container auth-container my-5">
        <div class="auth-card">
            
            <!-- Left Image Side -->
            <div class="auth-image">
                <h2 class="mb-4">Chào mừng trở lại!</h2>
                <p>Khám phá bộ nhớ thông minh, quản lý thiết bị gia đình bằng AI và nhiều công nghệ vượt trội khác tại SmartHome.</p>
            </div>

            <!-- Right Form Side -->
            <div class="auth-form-container">
                
                <!-- Login Form -->
                <div id="login-form">
                    <h3 class="font-heading mb-4 text-center">Đăng nhập</h3>
                    <form id="form-login">
                        <div class="mb-3">
                            <label class="form-label text-secondary">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="loginUsername" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary">Mật khẩu</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3" id="btnLogin">Đăng nhập <i class="fa-solid fa-arrow-right"></i></button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="#" class="text-secondary text-decoration-none">Quên mật khẩu?</a>
                        <hr class="border-secondary">
                        <p class="text-secondary">Chưa có tài khoản? <a href="#" class="text-accent toggle-auth" style="color:var(--accent-color)">Đăng ký ngay</a></p>
                    </div>
                </div>

                <!-- Register Form -->
                <div id="register-form">
                    <h3 class="font-heading mb-4 text-center">Tạo tài khoản mới</h3>
                    <form id="form-register">
                        <div class="row">
                            <div class="col-12 mb-3">
                                <label class="form-label text-secondary">Tên hiển thị</label>
                                <input type="text" class="form-control" id="regFullName" required placeholder="Nguyễn Văn A">
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label text-secondary">Email</label>
                                <input type="email" class="form-control" id="regEmail" required placeholder="example@email.com">
                            </div>
                            <div class="col-12 mb-4">
                                <label class="form-label text-secondary">Mật khẩu</label>
                                <input type="password" class="form-control" id="regPassword" required placeholder="Tối thiểu 6 ký tự">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3" id="btnRegister">Đăng ký thành viên</button>
                    </form>
                    <div class="text-center mt-3">
                        <p class="text-secondary">Đã có tài khoản? <a href="#" class="text-accent toggle-auth" style="color:var(--accent-color)">Đăng nhập</a></p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Redirect nếu đã đăng nhập
            if(localStorage.getItem('token')) {
                window.location.href = 'index.html';
                return;
            }

            const loginView = document.getElementById('login-form');
            const registerView = document.getElementById('register-form');
            const toggleBtns = document.querySelectorAll('.toggle-auth');

            toggleBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if(loginView.style.display === 'none') {
                        loginView.style.display = 'block';
                        registerView.style.display = 'none';
                    } else {
                        loginView.style.display = 'none';
                        registerView.style.display = 'block';
                    }
                });
            });

            // Handle Login
            document.getElementById('form-login').addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = document.getElementById('btnLogin');
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';
                btn.disabled = true;

                const email = document.getElementById('loginUsername').value;
                const password = document.getElementById('loginPassword').value;

                axios.post('http://localhost:8080/api/auth/login', { email, password })
                .then(res => {
                    const data = res.data;
                    if(data.token) {
                        // Lưu thông tin vào localStorage
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('email', data.email || email);
                        localStorage.setItem('fullName', data.fullName || email);
                        localStorage.setItem('role', data.role || 'CUSTOMER');
                        showToast('success', 'Đăng nhập thành công!');

                        // Check if Admin & redirect
                        setTimeout(() => {
                            try {
                                const role = data.role || '';
                                if (role === 'ADMIN') {
                                    window.location.href = 'admin/index.html';
                                } else {
                                    window.location.href = 'index.html';
                                }
                            } catch(e) {
                                window.location.href = 'index.html';
                            }
                        }, 1000);
                    } else {
                        showToast('error', data.message || 'Đăng nhập thất bại!');
                        btn.innerHTML = 'Đăng nhập <i class="fa-solid fa-arrow-right"></i>';
                        btn.disabled = false;
                    }
                })
                .catch(err => {
                    showToast('error', err.response?.data?.message || 'Sai thông tin đăng nhập!');
                    btn.innerHTML = 'Đăng nhập <i class="fa-solid fa-arrow-right"></i>';
                    btn.disabled = false;
                });
            });

            // Handle Register
            document.getElementById('form-register').addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = document.getElementById('btnRegister');
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';
                btn.disabled = true;

                const fullName = document.getElementById('regFullName').value;
                const email = document.getElementById('regEmail').value;
                
                if (!email.toLowerCase().endsWith('@gmail.com')) {
                    showToast('warning', 'Vui lòng sử dụng địa chỉ @gmail.com');
                    btn.innerHTML = 'Đăng ký thành viên';
                    btn.disabled = false;
                    return;
                }
                
                const password = document.getElementById('regPassword').value;

                // Kiểm tra độ phức tạp: ít nhất 6 ký tự, 1 chữ, 1 số
                const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d).{6,}$/;
                if (!passwordRegex.test(password)) {
                    showToast('warning', 'Mật khẩu phải có ít nhất 6 ký tự, bao gồm cả chữ và số');
                    btn.innerHTML = 'Đăng ký thành viên';
                    btn.disabled = false;
                    return;
                }

                axios.post('http://localhost:8080/api/auth/register', { email, password, fullName })
                .then(res => {
                    showToast('success', 'Đăng ký thành công! Đang tự động đăng nhập...');
                    // Auto login sau khi đăng ký
                    return axios.post('http://localhost:8080/api/auth/login', { email, password });
                })
                .then(res => {
                    if(res && res.data && res.data.token) {
                        localStorage.setItem('token', res.data.token);
                        setTimeout(() => window.location.href = 'index.html', 1500);
                    }
                })
                .catch(err => {
                    showToast('error', err.response?.data?.message || 'Đăng ký thất bại!');
                    btn.innerHTML = 'Đăng ký thành viên';
                    btn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
