<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm - SmartHome Admin</title>
    <!-- Fonts & Bootstrap CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- DataTables CSS (Dark) -->
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <!-- Admin Custom CSS -->
    <link rel="stylesheet" href="css/admin-style.css">
    <style>
        .product-img-thumbnail {
            width: 50px; height: 50px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #fff;
        }
        .action-btns .btn { padding: 4px 8px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-house-signal"></i> <span>Smart<b>Admin</b></span>
        </div>
        <div class="sidebar-menu">
            <a href="index.html" class="menu-item">
                <i class="fa-solid fa-gauge-high"></i> <span>Tổng quan Dashboard</span>
            </a>
            <a href="products.html" class="menu-item active">
                <i class="fa-solid fa-box-open"></i> <span>Quản lý Sản phẩm</span>
            </a>
            <a href="orders.html" class="menu-item">
                <i class="fa-solid fa-cart-shopping"></i> <span>Quản lý Đơn hàng</span>
            </a>
            <a href="users.html" class="menu-item">
                <i class="fa-solid fa-users"></i> <span>Khách hàng</span>
            </a>
            <a href="promotions.html" class="menu-item">
                <i class="fa-solid fa-tags"></i> <span>Khuyến mãi</span>
            </a>

            <a href="reports.html" class="menu-item">
                <i class="fa-solid fa-chart-pie"></i> <span>Báo cáo & Thống kê</span>
            </a>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logout-btn-action">
                <i class="fa-solid fa-power-off"></i> <span>Đăng xuất</span>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-content" id="main-content">
        
        <!-- HeaderBar -->
        <header class="admin-header">
            <div class="d-flex align-items-center gap-3">
                <button class="toggle-sidebar-btn" id="toggle-btn"><i class="fa-solid fa-bars"></i></button>
                <h4 class="m-0 font-weight-bold">Quản lý Sản phẩm</h4>
            </div>
            <div class="header-profile">
                <!-- Nút add -->
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="resetForm()">
                    <i class="fa-solid fa-plus"></i> Thêm Sản phẩm
                </button>
                <img src="https://ui-avatars.com/api/?name=Admin&background=3b82f6&color=fff" alt="Admin" class="ms-3">
            </div>
        </header>

        <!-- DataTable Box -->
        <div class="chart-box">
            <div class="table-responsive">
                <table id="productsTable" class="table table-striped table-hover mt-3 w-100">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Ảnh</th>
                            <th>Tên Sản Phẩm</th>
                            <th>Danh mục</th>
                            <th>Thương hiệu</th>
                            <th>Giá (VNĐ)</th>
                            <th>Kho</th>
                            <th>Trạng thái</th>
                            <th>Flash Sale</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data fetched via DataTables -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Product Form Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Thêm Sản phẩm mới</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="pId">
                        
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label text-secondary">Tên Sản phẩm <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="pName" required>
                                
                                <div class="row mt-3">
                                    <div class="col-6">
                                        <label class="form-label text-secondary">Giá bán (Gốc) <span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="pPrice" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label text-secondary">Giá Khuyến mãi (Tuỳ chọn)</label>
                                        <input type="number" class="form-control" id="pSalePrice">
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-6">
                                        <label class="form-label text-secondary">Giá nhập hàng (Giá vốn) <span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="pCostPrice" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label text-secondary">Thương hiệu</label>
                                        <input type="text" class="form-control" id="pBrand">
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12">
                                        <label class="form-label text-secondary">Danh mục ID</label>
                                        <input type="number" class="form-control" id="pCategoryId" value="1" required>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-secondary">Ảnh Sản phẩm (Các URL cách nhau bởi dấu phẩy)</label>
                                <input type="text" class="form-control mb-3" id="pImageUrl" placeholder="url1, url2, url3...">
                                <div id="imagesPreviewContainer" class="border border-secondary rounded-3 d-flex flex-wrap gap-2 p-2" style="min-height: 150px; background: rgba(0,0,0,0.2);">
                                    <span id="imgPlaceholder" class="text-secondary w-100 text-center align-self-center"><i class="fa-solid fa-image fs-1"></i></span>
                                </div>
                                
                                <label class="form-label text-secondary mt-3">Số lượng Kho</label>
                                <input type="number" class="form-control" id="pStock" value="100" required>
                                
                                <div class="form-check form-switch mt-3 pt-2">
                                    <input class="form-check-input" type="checkbox" id="pIsActive" checked>
                                    <label class="form-check-label text-secondary">Đang bán (Kích hoạt)</label>
                                </div>
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" id="pIsFlashSale">
                                    <label class="form-check-label text-accent fw-bold"><i class="fa-solid fa-bolt"></i> Hiển thị Flash Sale</label>
                                </div>
                                <div class="mt-2">
                                    <label class="form-label text-secondary small mb-1">Ngày kết thúc Flash Sale</label>
                                    <div class="input-group input-group-sm">
                                        <input type="datetime-local" class="form-control" id="pFlashSaleEndDate">
                                        <button class="btn btn-outline-warning" type="button" onclick="syncFlashSaleTime()">Áp dụng tất cả</button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 mt-3">
                                <label class="form-label text-secondary">Mô tả sản phẩm</label>
                                <textarea class="form-control" id="pDescription" rows="4"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" id="btnSaveProduct">Lưu Sản phẩm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- jQuery & DataTables requirements -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <!-- Axios & SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Admin Core -->
    <script src="js/admin.js"></script>
    
    <script>
        let dataTable;
        
        document.addEventListener('DOMContentLoaded', () => {
            initDataTable();
            
            // Image Preview Event
            document.getElementById('pImageUrl').addEventListener('input', function(e) {
                const container = document.getElementById('imagesPreviewContainer');
                const placeholder = document.getElementById('imgPlaceholder');
                container.innerHTML = ''; // Clear current previews
                
                if(this.value) {
                    const urls = this.value.split(',').map(u => u.trim()).filter(u => u !== '');
                    if (urls.length > 0) {
                        placeholder.style.display = 'none';
                        urls.forEach(url => {
                            const img = document.createElement('img');
                            img.src = url;
                            img.style.cssText = 'width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #444;';
                            img.onerror = () => img.src = 'https://dummyimage.com/60x60/333/fff&text=Error';
                            container.appendChild(img);
                        });
                    } else {
                        container.appendChild(placeholder);
                        placeholder.style.display = 'block';
                    }
                } else {
                    container.appendChild(placeholder);
                    placeholder.style.display = 'block';
                }
            });

            // Save Product Action
            document.getElementById('btnSaveProduct').addEventListener('click', saveProduct);
        });

        // Tích hợp DataTables với Backend Spring Boot (Server-side/Client-side)
        function initDataTable() {
            dataTable = $('#productsTable').DataTable({
                ajax: {
                    url: 'http://localhost:8080/api/v1/products/admin?size=1000', // Load danh sách tất cả sản phẩm cho admin
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    dataSrc: 'data.content'
                },
                columns: [
                    { 
                        data: 'id', 
                        render: function (data, type, row, meta) {
                            return meta.row + meta.settings._iDisplayStart + 1;
                        }
                    },
                    { 
                        data: 'imageUrls', 
                        render: function(data) {
                            let urls = [];
                            try {
                                urls = JSON.parse(data);
                            } catch (e) {
                                urls = data ? data.split(',') : [];
                            }
                            let img = (urls && urls.length > 0) ? urls[0] : 'https://dummyimage.com/50x50/ccc/fff';
                            return `<img src="${img}" class="product-img-thumbnail">`;
                        }
                    },
                    { data: 'name', width: '25%' },
                    { data: 'categoryName', defaultContent: '<em>Không thuộc DM</em>' },
                    { data: 'brand', defaultContent: '-' },
                    { 
                        data: 'price',
                        render: function(data, type, row) {
                            let actual = row.salePrice || row.price;
                            return `<span class="text-accent fw-bold">${formatCurrency(actual)}</span>`;
                        }
                    },
                    { data: 'stockQuantity' },
                    { 
                        data: 'isActive',
                        render: function(data) {
                            return data 
                                ? '<span class="badge bg-success">Đang bán</span>'
                                : '<span class="badge bg-danger">Ngừng bán</span>';
                        }
                    },
                    { 
                        data: 'isFlashSale',
                        render: function(data) {
                            return data 
                                ? '<span class="badge bg-warning text-dark"><i class="fa-solid fa-bolt"></i> Flash Sale</span>'
                                : '<span class="text-secondary small">Không</span>';
                        }
                    },
                    {
                        data: 'id',
                        orderable: false,
                        render: function(data, type, row) {
                            // Lưu dữ liệu row vào attr để edit
                            const encodedData = encodeURIComponent(JSON.stringify(row));
                            return `
                                <div class="action-btns">
                                    <button class="btn btn-outline-primary" onclick="editProduct('${encodedData}')" title="Sửa"><i class="fa-solid fa-pen"></i></button>
                                    <button class="btn btn-outline-danger" onclick="deleteProduct(${data})" title="Xóa"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            `;
                        }
                    }
                ],
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.13.7/i18n/vi.json',
                    search: "Tìm kiếm:",
                    lengthMenu: "Hiện _MENU_ dòng",
                },
                order: [[0, 'asc']], // Sản phẩm mới nhất nằm dưới cùng
                pageLength: 10
            });
        }

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('pId').value = '';
            document.getElementById('imagesPreviewContainer').innerHTML = '<span id="imgPlaceholder" class="text-secondary w-100 text-center align-self-center"><i class="fa-solid fa-image fs-1"></i></span>';
            document.getElementById('modalTitle').innerText = 'Thêm Sản phẩm mới';
        }

        function editProduct(encodedRow) {
            const row = JSON.parse(decodeURIComponent(encodedRow));
            
            document.getElementById('pId').value = row.id;
            document.getElementById('pName').value = row.name;
            document.getElementById('pPrice').value = row.price;
            document.getElementById('pSalePrice').value = row.salePrice || '';
            document.getElementById('pCostPrice').value = row.costPrice || '';
            document.getElementById('pBrand').value = row.brand || '';
            document.getElementById('pStock').value = row.stockQuantity;
            document.getElementById('pIsActive').checked = row.isActive;
            document.getElementById('pIsFlashSale').checked = row.isFlashSale || false;
            document.getElementById('pFlashSaleEndDate').value = row.flashSaleEndDate ? row.flashSaleEndDate.substring(0, 16) : '';
            document.getElementById('pDescription').value = row.description || '';
            document.getElementById('pCategoryId').value = row.categoryId || 1;
            
            // Image URLs handling
            let urls = [];
            if (row.imageUrls) {
                try {
                    urls = JSON.parse(row.imageUrls);
                } catch (e) {
                    urls = row.imageUrls.split(',');
                }
            }
            document.getElementById('pImageUrl').value = urls.join(', ');
            document.getElementById('pImageUrl').dispatchEvent(new Event('input')); // trigger preview

            document.getElementById('modalTitle').innerText = 'Cập nhật Sản phẩm: #' + row.id;
            
            // Show modal
            new bootstrap.Modal(document.getElementById('productModal')).show();
        }

        function saveProduct() {
            const id = document.getElementById('pId').value;
            const data = {
                name: document.getElementById('pName').value,
                price: parseFloat(document.getElementById('pPrice').value),
                salePrice: parseFloat(document.getElementById('pSalePrice').value) || null,
                costPrice: parseFloat(document.getElementById('pCostPrice').value) || 0,
                categoryId: parseInt(document.getElementById('pCategoryId').value) || 1,
                brand: document.getElementById('pBrand').value,
                stockQuantity: parseInt(document.getElementById('pStock').value),
                description: document.getElementById('pDescription').value,
                imageUrls: document.getElementById('pImageUrl').value,
                isActive: document.getElementById('pIsActive').checked,
                isFlashSale: document.getElementById('pIsFlashSale').checked,
                flashSaleEndDate: document.getElementById('pFlashSaleEndDate').value || null
            };

            const btn = document.getElementById('btnSaveProduct');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Xử lý...';
            btn.disabled = true;

            const request = id 
                ? apiClient.put('/products/' + id, data) 
                : apiClient.post('/products', data);

            request.then(res => {
                showToast('success', id ? 'Cập nhật thành công!' : 'Tạo mới thành công!');
                bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
                dataTable.ajax.reload(null, false); // Reload table
            }).catch(err => {
                showToast('error', err.response?.data?.message || 'Có lỗi xảy ra');
            }).finally(() => {
                btn.innerHTML = 'Lưu Sản phẩm';
                btn.disabled = false;
            });
        }

        function deleteProduct(id) {
            Swal.fire({
                title: 'Cảnh báo',
                text: "Bạn có chắc chắn muốn xoá sản phẩm này?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                background: '#1e293b', color: '#fff',
                confirmButtonText: 'Có, Xoá ngay!',
                cancelButtonText: 'Huỷ'
            }).then((result) => {
                if (result.isConfirmed) {
                    apiClient.delete('/products/' + id)
                    .then(res => {
                        showToast('success', 'Đã xoá thành công');
                        dataTable.ajax.reload(null, false);
                    })
                    .catch(err => showToast('error', 'Lỗi xoá: ' + (err.response?.data?.message || '')));
                }
            })
        }
        async function syncFlashSaleTime() {
            const endTime = document.getElementById('pFlashSaleEndDate').value;
            if (!endTime) {
                showToast('error', 'Vui lòng chọn thời gian kết thúc trước');
                return;
            }
            
            Swal.fire({
                title: 'Đồng bộ thời gian',
                text: "Bạn có muốn áp dụng thời gian này cho TẤT CẢ sản phẩm đang Flash Sale?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#f59e0b',
                background: '#1e293b', color: '#fff',
                confirmButtonText: 'Đồng bộ ngay',
                cancelButtonText: 'Huỷ'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        await apiClient.post(`/products/sync-flash-sale-time?endTime=${endTime}`);
                        showToast('success', 'Đã đồng bộ thời gian thành công!');
                        dataTable.ajax.reload(null, false);
                    } catch (err) {
                        showToast('error', 'Lỗi đồng bộ: ' + (err.response?.data?.message || ''));
                    }
                }
            });
        }

        function setDiscount(percent) {
            const originalPriceInput = document.getElementById('pPrice');
            const salePriceInput = document.getElementById('pSalePrice');
            
            const originalPrice = parseFloat(originalPriceInput.value);
            if (!originalPrice || isNaN(originalPrice)) {
                showToast('error', 'Vui lòng nhập Giá bán (Gốc) trước!');
                return;
            }
            
            if (percent === 0) {
                salePriceInput.value = originalPrice;
            } else {
                const discountedPrice = originalPrice * (1 - percent / 100);
                salePriceInput.value = Math.round(discountedPrice);
            }
        }
    </script>
</body>
</html>
