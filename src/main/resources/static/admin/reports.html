<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo & Thống kê - SmartHome Admin</title>
    <!-- Fonts & Bootstrap CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Admin Custom CSS -->
    <link rel="stylesheet" href="css/admin-style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-house-signal"></i> <span>Smart<b>Admin</b></span>
        </div>
        <div class="sidebar-menu">
            <a href="index.html" class="menu-item">
                <i class="fa-solid fa-gauge-high"></i> <span>Tổng quan Dashboard</span>
            </a>
            <a href="products.html" class="menu-item">
                <i class="fa-solid fa-box-open"></i> <span>Quản lý Sản phẩm</span>
            </a>
            <a href="orders.html" class="menu-item">
                <i class="fa-solid fa-cart-shopping"></i> <span>Quản lý Đơn hàng</span>
            </a>
            <a href="users.html" class="menu-item">
                <i class="fa-solid fa-users"></i> <span>Khách hàng</span>
            </a>
            <a href="promotions.html" class="menu-item">
                <i class="fa-solid fa-tags"></i> <span>Khuyến mãi</span>
            </a>

            <a href="reports.html" class="menu-item active">
                <i class="fa-solid fa-chart-pie"></i> <span>Báo cáo & Thống kê</span>
            </a>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logout-btn-action">
                <i class="fa-solid fa-power-off"></i> <span>Đăng xuất</span>
            </button>
        </div>
    </aside>

    <div class="main-content" id="main-content">
        <header class="admin-header">
            <div class="d-flex align-items-center gap-3">
                <button class="toggle-sidebar-btn" id="toggle-btn"><i class="fa-solid fa-bars"></i></button>
                <h4 class="m-0 font-weight-bold">Báo cáo Mở rộng (Excel / PDF)</h4>
            </div>
        </header>

        <div class="row g-4">
            <!-- Filter Section -->
            <div class="col-12">
                <div class="chart-box shadow-sm border-blue">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0"><i class="fa-solid fa-filter me-2 text-primary"></i> Bộ lọc báo cáo</h5>
                        <div class="d-flex gap-2">
                             <button class="btn btn-outline-secondary" id="btn-print-report">
                                <i class="fa-solid fa-print me-2"></i> In báo cáo
                            </button>
                            <button class="btn btn-success" id="btn-export-excel">
                                <i class="fa-solid fa-file-excel me-2"></i> Xuất Excel
                            </button>
                        </div>
                    </div>
                    <form id="report-filter-form" class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Từ ngày</label>
                            <input type="date" class="form-control" id="filter-from-date">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Đến ngày</label>
                            <input type="date" class="form-control" id="filter-to-date">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Trạng thái</label>
                            <select class="form-select" id="filter-status">
                                <option value="">Tất cả</option>
                                <option value="DELIVERED">Thành công (Đã giao)</option>
                                <option value="PENDING">Chờ xử lý</option>
                                <option value="SHIPPING">Đang giao</option>
                                <option value="CANCELLED">Đã hủy</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <button type="button" class="btn btn-primary w-100" id="btn-preview-report">
                                <i class="fa-solid fa-eye me-2"></i> Xem trước dữ liệu
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Preview Table Section -->
            <div class="col-12">
                <div class="chart-box shadow-sm border-blue" id="preview-section" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold m-0">Nội dung báo cáo chi tiết</h5>
                        <span class="badge bg-info" id="report-summary-count">0 đơn hàng</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle custom-table">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Khách hàng</th>
                                    <th>SĐT</th>
                                    <th>Địa chỉ</th>
                                    <th>Tổng tiền</th>
                                    <th>Trạng thái</th>
                                    <th>Ngày đặt</th>
                                </tr>
                            </thead>
                            <tbody id="report-preview-body">
                                <!-- Data will be rendered here -->
                            </tbody>
                            <tfoot class="table-light">
                                <tr>
                                    <th colspan="4" class="text-end">Tổng cộng doanh thu:</th>
                                    <th colspan="3" id="report-total-revenue" class="text-success">0đ</th>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cấu hình Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/admin.js"></script>
</body>
</html>
