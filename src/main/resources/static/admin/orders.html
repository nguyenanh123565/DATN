<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đơn hàng - SmartHome Admin</title>
    <!-- Fonts & Bootstrap CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- DataTables CSS (Dark) -->
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <!-- Admin Custom CSS -->
    <link rel="stylesheet" href="css/admin-style.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-house-signal"></i> <span>Smart<b>Admin</b></span>
        </div>
        <div class="sidebar-menu">
            <a href="index.html" class="menu-item">
                <i class="fa-solid fa-gauge-high"></i> <span>Tổng quan Dashboard</span>
            </a>
            <a href="products.html" class="menu-item">
                <i class="fa-solid fa-box-open"></i> <span>Quản lý Sản phẩm</span>
            </a>
            <a href="orders.html" class="menu-item active">
                <i class="fa-solid fa-cart-shopping"></i> <span>Quản lý Đơn hàng</span>
            </a>
            <a href="users.html" class="menu-item">
                <i class="fa-solid fa-users"></i> <span>Khách hàng</span>
            </a>
            <a href="promotions.html" class="menu-item">
                <i class="fa-solid fa-tags"></i> <span>Khuyến mãi</span>
            </a>

            <a href="reports.html" class="menu-item">
                <i class="fa-solid fa-chart-pie"></i> <span>Báo cáo & Thống kê</span>
            </a>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logout-btn-action">
                <i class="fa-solid fa-power-off"></i> <span>Đăng xuất</span>
            </button>
        </div>
    </aside>

    <div class="main-content" id="main-content">
        <header class="admin-header">
            <div class="d-flex align-items-center gap-3">
                <button class="toggle-sidebar-btn" id="toggle-btn"><i class="fa-solid fa-bars"></i></button>
                <h4 class="m-0 font-weight-bold">Quản lý Đơn hàng</h4>
            </div>
            <div class="header-profile">
                <button class="btn btn-outline-success"><i class="fa-solid fa-download"></i> Xuất Báo cáo</button>
            </div>
        </header>

        <div class="row g-4 mb-4">
            <div class="col-sm-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-info">
                        <h5>Chờ xác nhận</h5>
                        <h3 class="text-warning" id="count-pending">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-info">
                        <h5>Đang giao</h5>
                        <h3 class="text-blue" id="count-shipping">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-info">
                        <h5>Hoàn thành</h5>
                        <h3 class="text-green" id="count-delivered">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-info">
                        <h5>Huỷ đơn</h5>
                        <h3 class="text-red" id="count-cancelled">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="chart-box">
            <div class="table-responsive">
                <table id="ordersTable" class="table table-striped table-hover mt-3 w-100">
                    <thead>
                        <tr>
                            <th>Mã KH</th>
                            <th>Mã Đơn hàng</th>
                            <th>Ngày đặt</th>
                            <th>Trạng thái</th>
                            <th>Tổng thanh toán</th>
                            <th>Ghi chú</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dữ liệu fetch từ DataTables -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/admin.js"></script>

    <script>
        // Formatter formatCurrency if not locally defined in this file
        function formatCurrencyAdmin(value) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(value);
        }

        $(document).ready(function() {
            $('#ordersTable').DataTable({
                "ajax": {
                    "url": "http://localhost:8080/api/v1/orders?size=1000", 
                    "headers": { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    "dataSrc": "data.content",
                    "error": function(xhr) {
                        if(xhr.status === 401 || xhr.status === 403) {
                            showToast('error', 'Phiên đăng nhập hết hạn hoặc không có quyền truy cập');
                            setTimeout(() => { window.location.href = '../auth.html'; }, 1500);
                        } else {
                            showToast('error', 'Không thể tải danh sách đơn hàng');
                        }
                    }
                },
                "columns": [
                    { data: 'userId', render: data => `<span class="fw-bold text-secondary">#USR-${data}</span>` },
                    { data: 'id', render: data => `<span class="fw-bold text-accent">#ORD-${data}</span>` },
                    { data: 'createdAt', render: data => new Date(data).toLocaleString() },
                    { 
                        data: 'status', 
                        render: function(data) {
                            if(data === 'PENDING') return '<span class="badge bg-warning text-dark">Chờ Xác Nhận</span>';
                            if(data === 'PROCESSING') return '<span class="badge bg-info text-dark">Đang Xử Lý</span>';
                            if(data === 'SHIPPING') return '<span class="badge bg-primary">Đang Giao Hàng</span>';
                            if(data === 'DELIVERED') return '<span class="badge bg-success">Đã Giao Xong</span>';
                            if(data === 'CANCELLED') return '<span class="badge bg-danger">Đã Hủy</span>';
                            return `<span class="badge bg-secondary">${data}</span>`;
                        }
                    },
                    { data: 'finalAmount', render: data => `<span class="text-success fw-bold">${formatCurrencyAdmin(data)}</span>` },
                    { data: 'notes', defaultContent: '-' },
                    {
                        data: 'id',
                        orderable: false,
                        render: function(data, type, row) {
                            let btns = '';
                            if(row.status === 'PENDING') {
                                btns += `<button class="btn btn-sm btn-info me-1" onclick="updateOrderStatus(${data}, 'PROCESSING')" title="Xác nhận & Xử lý"><i class="fa-solid fa-box"></i></button>`;
                                btns += `<button class="btn btn-sm btn-danger" onclick="updateOrderStatus(${data}, 'CANCELLED')" title="Huỷ Đơn"><i class="fa-solid fa-ban"></i></button>`;
                            } else if (row.status === 'PROCESSING') {
                                btns += `<button class="btn btn-sm btn-primary me-1" onclick="updateOrderStatus(${data}, 'SHIPPING')" title="Đang Giao"><i class="fa-solid fa-truck"></i></button>`;
                            } else if (row.status === 'SHIPPING') {
                                btns += `<span class="text-info small fw-bold"><i class="fa-solid fa-clock"></i> Chờ khách nhận</span>`;
                            } else if (row.status === 'DELIVERED') {
                                btns += `<button class="btn btn-sm btn-secondary disabled" title="Đã hoàn thành"><i class="fa-solid fa-check"></i></button>`;
                            }
                            return `<div class="action-btns">${btns}</div>`;
                        }
                    }
                ],
                "language": {
                    "url": "//cdn.datatables.net/plug-ins/1.13.7/i18n/vi.json",
                    "search": "Tìm kiếm:"
                },
                "order": [[2, 'desc']]
            });

            loadOrderStatistics();
        });

        function loadOrderStatistics() {
            axios.get('http://localhost:8080/api/v1/orders/statistics', {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            })
            .then(res => {
                const stats = res.data.data;
                $('#count-pending').text(stats.PENDING || 0);
                $('#count-shipping').text(stats.SHIPPING || 0);
                $('#count-delivered').text(stats.DELIVERED || 0);
                $('#count-cancelled').text(stats.CANCELLED || 0);
            })
            .catch(e => {
                console.error("Lỗi khi tải thống kê:", e);
            });
        }

        async function updateOrderStatus(id, newStatus) {
            let actualShippingCost = null;

            if (newStatus === 'SHIPPING') {
                const { value: shipCost } = await Swal.fire({
                    title: 'Xác nhận Giao hàng',
                    text: 'Vui lòng nhập TỔNG PHÍ VẬN CHUYỂN phải trả cho đơn vị vận chuyển (GHTK/GHN...). Hệ thống sẽ dùng số này để khấu trừ doanh thu:',
                    input: 'number',
                    inputLabel: 'Tổng phí ship trả cho bưu tá (VNĐ)',
                    inputPlaceholder: 'Nhập tổng phí, ví dụ: 35000',
                    showCancelButton: true,
                    confirmButtonText: 'Xác nhận & Giao hàng',
                    cancelButtonText: 'Huỷ',
                    background: '#1e293b', color: '#fff',
                    inputValidator: (value) => {
                        if (!value || value < 0) {
                            return 'Vui lòng nhập số tiền hợp lệ!'
                        }
                    }
                });

                if (!shipCost) return; // User cancelled
                actualShippingCost = shipCost;
            } else {
                const result = await Swal.fire({
                    title: 'Thay đổi trạng thái?',
                    text: "Xác nhận đổi trạng thái đơn hàng này thành " + newStatus,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#3b82f6',
                    cancelButtonColor: '#dc3545',
                    confirmButtonText: 'Xác nhận',
                    cancelButtonText: 'Huỷ',
                    background: '#1e293b', color: '#fff'
                });
                if (!result.isConfirmed) return;
            }

            let url = `http://localhost:8080/api/v1/orders/${id}/status?status=${newStatus}`;
            if (actualShippingCost !== null) {
                url += `&actualShippingCost=${actualShippingCost}`;
            }

            axios.put(url, {}, {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            })
            .then(res => {
                showToast('success', 'Đã cập nhật trạng thái đơn hàng');
                $('#ordersTable').DataTable().ajax.reload(null, false);
                loadOrderStatistics();
            })
            .catch(e => {
                showToast('error', 'Cập nhật thất bại: ' + (e.response?.data?.message || 'Lỗi hệ thống'));
            });
        }
    </script>
</body>
</html>
