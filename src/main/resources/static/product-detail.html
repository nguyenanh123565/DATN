<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - SmartHome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-gallery {
            border-radius: 15px;
            overflow: hidden;
            background: #fff;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .product-gallery img {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
        }
        .specs-table {
            color: var(--text-primary);
        }
        .specs-table td {
            background-color: transparent !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color);
        }
        .specs-table td:first-child {
            color: var(--text-secondary) !important;
            width: 40%;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fa-solid fa-house-signal"></i> Smart<span>Home</span></a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Sản phẩm</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html" style="position:relative">
                            <i class="fa-solid fa-cart-shopping fs-5"></i>
                            <span class="badge bg-danger rounded-circle position-absolute top-0 start-100 translate-middle" id="cart-count">0</span>
                        </a>
                    </li>
                    <li class="nav-item" id="nav-login-btn">
                        <a href="auth.html" class="btn btn-primary ms-3">Đăng nhập</a>
                    </li>
                    <li class="nav-item dropdown" id="nav-user-menu" style="display:none">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-circle-user fs-5 text-accent"></i> Tài khoản
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark">
                            <li><a class="dropdown-item" href="profile.html">Hồ sơ</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5" id="product-container">
        <!-- Đang tải -->
        <div class="text-center py-5" id="loading">
            <div class="spinner-border text-accent" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-3 text-secondary">Đang tải thông tin sản phẩm...</p>
        </div>
    </div>

    <!-- AI Chat Widget (Góc phải dưới màn hình) -->
    <div id="ai-widget" class="ai-widget-container">
        <div class="ai-widget-btn" id="ai-widget-btn"><i class="fa-solid fa-robot"></i></div>
        <div class="ai-chat-box" id="ai-chat-box">
            <div class="ai-chat-header">
                <h5 class="text-white m-0"><i class="fa-solid fa-microchip me-2"></i> Trợ lý SmartHome AI</h5>
                <i class="fa-solid fa-xmark ai-close-btn fs-4" id="ai-close-btn"></i>
            </div>
            <div class="ai-chat-messages" id="ai-chat-messages">
                <div class="ai-msg bot">Chào bạn! Bạn cần thêm thông tin về sản phẩm này không?</div>
            </div>
            <div class="ai-chat-input-area">
                <input type="text" id="ai-chat-input" class="ai-chat-input" placeholder="Ví dụ: Lực hút của mẫu này bao nhiêu?">
                <button class="ai-send-btn" id="ai-send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
    <script src="js/ai-chat.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            const productSlug = params.get('slug');

            if (!productId && !productSlug) {
                document.getElementById('product-container').innerHTML = '<div class="alert alert-danger text-center">Không tìm thấy mã hoặc định danh sản phẩm. <a href="products.html">Quay lại trang sản phẩm</a></div>';
                return;
            }

            // URL API linh hoạt dựa trên id hoặc slug
            const apiUrl = productId ? `/products/${productId}` : `/products/slug/${productSlug}`;

            // Gọi API chi tiết sản phẩm
            apiClient.get(apiUrl)
                .then(res => {
                    const p = res.data.data;
                    renderProductContent(p);
                })
                .catch(err => {
                    document.getElementById('product-container').innerHTML = '<div class="alert alert-danger text-center">Sản phẩm không tồn tại hoặc lỗi máy chủ.</div>';
                });
        });

        function renderProductContent(p) {
            let imageUrl = 'https://dummyimage.com/600x600/f0f0f0/aaa&text=No+Image';
            if(p.imageUrls) {
                try {
                    const urls = JSON.parse(p.imageUrls);
                    if(urls.length > 0) imageUrl = urls[0];
                } catch(e) {
                    imageUrl = p.imageUrls.replace(/[\[\]"]/g, '').split(',')[0].trim();
                }
            }
            
            let priceHtml = ``;
            if (p.salePrice && p.salePrice < p.price) {
                priceHtml = `<h2 class="text-accent mb-0">${formatCurrency(p.salePrice)}</h2>
                             <span class="text-secondary text-decoration-line-through fs-5 ms-3">${formatCurrency(p.price)}</span>`;
            } else {
                priceHtml = `<h2 class="text-accent mb-0">${formatCurrency(p.price)}</h2>`;
            }

            // Render specs table
            let specsHtml = '';
            if(p.specs) {
                try {
                    const specsObj = JSON.parse(p.specs);
                    for(const [key, val] of Object.entries(specsObj)) {
                        specsHtml += `<tr><td>${key}</td><td>${val}</td></tr>`;
                    }
                } catch(e) {
                    specsHtml = `<tr><td colspan="2">${p.specs}</td></tr>`;
                }
            } else {
                specsHtml = `<tr><td colspan="2" class="text-center text-secondary">Chưa có thông số kỹ thuật</td></tr>`;
            }

            const isOutOfStock = p.stockQuantity <= 0;
            const stockText = isOutOfStock ? '<span class="text-danger fw-bold">Hết hàng</span>' : `<span class="text-success fw-bold">Còn hàng (${p.stockQuantity})</span>`;
            const disabledAttr = isOutOfStock ? 'disabled' : '';

            const html = `
                <div class="row mb-5">
                    <div class="col-md-6 mb-4 mb-md-0">
                        <div class="product-gallery">
                            <img src="${imageUrl}" alt="${p.name}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="products.html" class="text-secondary">Sản phẩm</a></li>
                                <li class="breadcrumb-item active text-white" aria-current="page">${p.categoryName || 'Chi tiết'}</li>
                            </ol>
                        </nav>
                        <h1 class="font-heading mb-3">${p.name}</h1>
                        <p class="text-secondary mb-3">Tình trạng: ${stockText} | Thương hiệu: <span class="text-white">${p.brand || 'Khác'}</span></p>
                        
                        <div class="d-flex align-items-center mb-4 bg-card p-3 rounded-3" style="border: 1px solid var(--border-color);">
                            ${priceHtml}
                        </div>
                        
                        <p class="mb-4 text-justify" style="line-height: 1.8;">${p.description || 'Chưa có mô tả cho sản phẩm này.'}</p>
                        
                        <div class="d-flex gap-3 mb-4">
                            <input type="number" id="qtyInput" class="form-control text-center bg-card text-white border-secondary" value="${isOutOfStock ? 0 : 1}" min="${isOutOfStock ? 0 : 1}" max="${p.stockQuantity}" style="width: 80px;" ${disabledAttr}>
                            <button class="btn ${isOutOfStock ? 'btn-secondary' : 'btn-outline'} flex-grow-1" onclick="addToCart(${p.id})" ${disabledAttr}>
                                <i class="fa-solid ${isOutOfStock ? 'fa-box-open' : 'fa-cart-plus'}"></i> ${isOutOfStock ? 'Hết hàng' : 'Thêm vào giỏ'}
                            </button>
                            <button class="btn ${isOutOfStock ? 'btn-secondary' : 'btn-primary'} flex-grow-1" onclick="buyNow(${p.id})" ${disabledAttr}>
                                <i class="fa-solid fa-bolt"></i> Mua ngay
                            </button>
                        </div>
                        
                        <div class="card bg-card border-secondary mt-5">
                            <div class="card-header bg-main border-secondary">
                                <h5 class="m-0 font-heading text-white p-2">Thông số kỹ thuật</h5>
                            </div>
                            <div class="card-body p-0">
                                <table class="table table-bordered specs-table m-0">
                                    <tbody>
                                        ${specsHtml}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('product-container').innerHTML = html;
        }

        function addToCart(productId) {
            if(!localStorage.getItem('token')) {
                showToast('warning', 'Vui lòng đăng nhập!');
                setTimeout(()=> window.location.href = 'auth.html', 1500);
                return;
            }
            const qty = document.getElementById('qtyInput').value || 1;
            apiClient.post('/cart/items', { productId: productId, quantity: parseInt(qty) })
            .then(res => {
                showToast('success', 'Đã thêm thành công!');
                const countBadge = document.getElementById('cart-count');
                countBadge.innerText = parseInt(countBadge.innerText) + parseInt(qty);
            }).catch(err => showToast('error', 'Lỗi: ' + (err.response?.data?.message || '')));
        }

        function buyNow(productId) {
            if(!localStorage.getItem('token')) {
                showToast('warning', 'Vui lòng đăng nhập để mua hàng!');
                setTimeout(()=> window.location.href = 'auth.html', 1500);
                return;
            }
            addToCart(productId);
            setTimeout(() => window.location.href = 'cart.html', 1000);
        }
    </script>
</body>
</html>
