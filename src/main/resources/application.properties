# =============================================
# APPLICATION CONFIGURATION - SMARTHOME
# =============================================

spring.application.name=smarthome-backend

# ===== SERVER =====
server.port=8080
server.servlet.context-path=/

# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://localhost:3306/smarthome_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== THYMELEAF =====
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===== FILE UPLOAD =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===== JWT =====
app.jwt.secret=smarthome_super_secret_key_2024_do_not_share_this_key_ever
app.jwt.expiration=86400000
# 86400000 ms = 24 hours

# ===== LOGGING =====
logging.level.com.smarthome=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# ===== AI / GEMINI - SENIOR DESIGN (1 KEY) =====
# Khuyến nghị: Đặt key vào biến môi trường GEMINI_API_KEY
app.ai.gemini.api-key=
app.ai.gemini.model=gemini-2.0-flash

# ===== AI / GROQ =====
app.ai.groq.enabled=true
app.ai.groq.api-key=YOUR_GROQ_API_KEY_HERE
app.ai.groq.model=llama-3.3-70b-versatile

# Cấu hình RAG
app.ai.rag.top-k=5
app.ai.rag.min-score=0.4

# Cấu hình Chatbot Rate Limit (5 req / 10s)
app.ai.chat.rate-limit.enabled=true 